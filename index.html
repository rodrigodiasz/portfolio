<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="images/fav.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rodrigo Oliveira</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener("load", function () {
        const currentQuery = window.location.search || "";
        const targetDomain = "localhost:3000";

        const links = Array.from(document.querySelectorAll("a[href]")).filter(
          (a) => a.href.includes(targetDomain)
        );

        links.forEach((a) => {
          const baseUrl = a.href.split("?")[0];
          a.href = baseUrl + currentQuery;
        });
      });
    </script>
  </body>
</html>
